<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#0b1020" />
    <title>Kapı Girişi — FizyoPark</title>
    <link rel="icon" href="./icons/icon.svg" type="image/svg+xml" />
    <style>
      :root{
        --bg:#0b1020;
        --panel:#121a33;
        --border:rgba(255,255,255,.08);
        --text:#e8ecff;
        --muted:rgba(232,236,255,.72);
        --accent:#7c5cff;
        --danger:#ff4d6d;
        --ok:#2bd576;
        --font: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, "Noto Sans", "Helvetica Neue", sans-serif;
      }
      *{ box-sizing:border-box; }
      html,body{ height:100%; margin:0; }
      body{
        font-family:var(--font);
        color:var(--text);
        background: radial-gradient(1200px 700px at 20% -10%, rgba(124,92,255,.35), transparent 60%),
                    radial-gradient(1000px 700px at 110% 20%, rgba(43,213,118,.12), transparent 55%),
                    var(--bg);
        display:flex;
        flex-direction:row;
        overflow:hidden;
        -webkit-user-select:none;
        user-select:none;
        cursor:none;
      }
      .kiosk-left,
      .kiosk-right{
        flex:0 0 50%;
        width:50%;
        min-width:0;
        height:100%;
        display:flex;
        align-items:center;
        justify-content:center;
        position:relative;
      }
      .kiosk-left{
        border-right:1px solid var(--border);
      }
      .kiosk{
        width:min(92%, 600px);
        max-width:100%;
        text-align:center;
        display:flex;
        flex-direction:column;
        align-items:center;
        gap:20px;
      }
      .kiosk__logo{
        width:min(90%, 110%);
        height:min(90%, 110%);
        background:url("./icons/fizyopark-logo-web.png") center / contain no-repeat;
        opacity:.9;
        animation: breathe 4.5s ease-in-out infinite;
        transform-origin: center center;
        will-change: transform, opacity, filter;
      }
      @keyframes breathe{
        0%, 100% {
          transform: scale(1);
          opacity:.88;
          filter: drop-shadow(0 0 0px rgba(124,92,255,0));
        }
        50% {
          transform: scale(1.035);
          opacity:1;
          filter: drop-shadow(0 0 28px rgba(124,92,255,.45));
        }
      }
      .kiosk__icon{
        width:140px;
        height:140px;
        border-radius:50%;
        display:flex;
        align-items:center;
        justify-content:center;
        font-size:72px;
        line-height:1;
        background:var(--panel);
        border:2px solid var(--border);
        transition: background .25s, border-color .25s, transform .15s;
      }
      .kiosk__icon.is-idle{
        animation: pulse 1.8s ease-in-out infinite;
      }
      .kiosk__icon.is-ok{
        background: rgba(43,213,118,.16);
        border-color: var(--ok);
        color: var(--ok);
      }
      .kiosk__icon.is-fail{
        background: rgba(255,77,109,.16);
        border-color: var(--danger);
        color: var(--danger);
      }
      @keyframes pulse{
        0%, 100% { transform: scale(1); opacity:.85; }
        50% { transform: scale(1.04); opacity:1; }
      }
      .kiosk__title{
        font-size:40px;
        font-weight:800;
        line-height:1.3;
        white-space:pre-line;
        margin:0;
        min-height:1.4em;
      }
      .kiosk__subtitle{
        font-size:16px;
        color:var(--muted);
        margin:0;
        min-height:1.4em;
      }
      .kiosk__clock{
        position:absolute;
        bottom:24px;
        right:28px;
        font-size:14px;
        color:var(--muted);
        font-variant-numeric: tabular-nums;
      }
      .kiosk__input{
        position:absolute;
        opacity:0;
        pointer-events:none;
        width:1px;
        height:1px;
      }
      /* Telefon girişi butonu */
      .kiosk__phone-btn{
        margin-top:8px;
        padding:10px 22px;
        background:transparent;
        border:1px solid var(--border);
        border-radius:10px;
        color:var(--muted);
        font-size:14px;
        cursor:pointer;
        font-family:var(--font);
        transition: border-color .2s, color .2s;
        -webkit-user-select:none;
        user-select:none;
      }
      .kiosk__phone-btn:hover, .kiosk__phone-btn:active{
        border-color:var(--accent);
        color:var(--text);
      }
      /* Telefon overlay */
      .kiosk__phone-overlay{
        position:fixed;
        inset:0;
        background:var(--bg);
        display:flex;
        flex-direction:column;
        align-items:center;
        justify-content:center;
        gap:24px;
        z-index:100;
      }
      .kiosk__phone-overlay[hidden]{ display:none; }
      .kiosk__phone-title{
        font-size:22px;
        font-weight:700;
        color:var(--muted);
        margin:0;
      }
      .kiosk__phone-display{
        font-size:42px;
        font-weight:800;
        letter-spacing:4px;
        min-width:320px;
        text-align:center;
        background:var(--panel);
        border:1px solid var(--border);
        border-radius:14px;
        padding:18px 28px;
        min-height:80px;
        display:flex;
        align-items:center;
        justify-content:center;
        font-variant-numeric:tabular-nums;
      }
      .kiosk__phone-pad{
        display:grid;
        grid-template-columns:repeat(3, 90px);
        grid-template-rows:repeat(4, 80px);
        gap:10px;
      }
      .kiosk__phone-pad button{
        background:var(--panel);
        border:1px solid var(--border);
        border-radius:12px;
        color:var(--text);
        font-size:28px;
        font-weight:700;
        font-family:var(--font);
        cursor:pointer;
        transition: background .15s, border-color .15s;
        -webkit-user-select:none;
        user-select:none;
      }
      .kiosk__phone-pad button:active{
        background:rgba(124,92,255,.25);
        border-color:var(--accent);
      }
      .kiosk__phone-pad button:disabled{
        opacity:.3;
        pointer-events:none;
      }
      .kiosk__phone-pad .btn-confirm{
        background:rgba(43,213,118,.15);
        border-color:var(--ok);
        color:var(--ok);
      }
      .kiosk__phone-pad .btn-confirm:active{
        background:rgba(43,213,118,.35);
      }
      .kiosk__phone-cancel{
        background:transparent;
        border:1px solid var(--border);
        border-radius:10px;
        color:var(--muted);
        font-size:16px;
        font-family:var(--font);
        padding:10px 32px;
        cursor:pointer;
        -webkit-user-select:none;
        user-select:none;
      }
      .kiosk__phone-cancel:active{ border-color:var(--danger); color:var(--danger); }
    </style>
  </head>
  <body>
    <div class="kiosk-left">
      <div class="kiosk__logo"></div>
    </div>
    <div class="kiosk-right">
      <main class="kiosk">
        <div class="kiosk__icon is-idle" id="kioskIcon">📷</div>
        <h1 class="kiosk__title" id="kioskTitle">QR kodunuzu okuyucuya gösterin</h1>
        <p class="kiosk__subtitle" id="kioskSubtitle">Üye portalındaki giriş kodunu okutucuya doğru tutun</p>
        <button class="kiosk__phone-btn" id="kioskPhoneBtn">📱 Telefon ile Giriş</button>
      </main>
      <div class="kiosk__clock" id="kioskClock"></div>
    </div>
    <input class="kiosk__input" id="kioskInput" type="text" autocomplete="off" autocapitalize="off" spellcheck="false" />

    <div class="kiosk__phone-overlay" id="phoneOverlay" hidden>
      <p class="kiosk__phone-title">Telefon Numaranız</p>
      <div class="kiosk__phone-display" id="phoneDisplay">_ _ _ _ _ _ _ _ _ _</div>
      <div class="kiosk__phone-pad" id="phonePad">
        <button data-digit="1">1</button>
        <button data-digit="2">2</button>
        <button data-digit="3">3</button>
        <button data-digit="4">4</button>
        <button data-digit="5">5</button>
        <button data-digit="6">6</button>
        <button data-digit="7">7</button>
        <button data-digit="8">8</button>
        <button data-digit="9">9</button>
        <button id="phoneBackspace">⌫</button>
        <button data-digit="0">0</button>
        <button class="btn-confirm" id="phoneConfirm" disabled>✓</button>
      </div>
      <button class="kiosk__phone-cancel" id="phoneCancelBtn">Vazgeç</button>
    </div>
    <script src="./api.js"></script>
    <script src="./kiosk.js"></script>
  </body>
</html>
