<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#0b1020" />
    <title>Kapı Girişi — FizyoPark</title>
    <link rel="icon" href="./icons/icon.svg" type="image/svg+xml" />
    <style>
      :root{
        --bg:#0b1020;
        --panel:#121a33;
        --border:rgba(255,255,255,.08);
        --text:#e8ecff;
        --muted:rgba(232,236,255,.72);
        --accent:#7c5cff;
        --danger:#ff4d6d;
        --ok:#2bd576;
        --font: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, "Noto Sans", "Helvetica Neue", sans-serif;
      }
      *{ box-sizing:border-box; }
      html,body{ height:100%; margin:0; }
      body{
        font-family:var(--font);
        color:var(--text);
        background: radial-gradient(1200px 700px at 20% -10%, rgba(124,92,255,.35), transparent 60%),
                    radial-gradient(1000px 700px at 110% 20%, rgba(43,213,118,.12), transparent 55%),
                    var(--bg);
        display:flex;
        flex-direction:row;
        overflow:hidden;
        -webkit-user-select:none;
        user-select:none;
        cursor:none;
      }
      .kiosk-left,
      .kiosk-right{
        flex:0 0 50%;
        width:50%;
        min-width:0;
        height:100%;
        display:flex;
        align-items:center;
        justify-content:center;
        position:relative;
      }
      .kiosk-left{
        border-right:1px solid var(--border);
      }
      .kiosk__logo{
        width:min(90%, 110%);
        height:min(90%, 110%);
        background:url("./icons/fizyopark-logo-web.png") center / contain no-repeat;
        opacity:.9;
        animation: breathe 4.5s ease-in-out infinite;
        transform-origin: center center;
        will-change: transform, opacity, filter;
      }
      @keyframes breathe{
        0%, 100% {
          transform: scale(1);
          opacity:.88;
          filter: drop-shadow(0 0 0px rgba(124,92,255,0));
        }
        50% {
          transform: scale(1.035);
          opacity:1;
          filter: drop-shadow(0 0 28px rgba(124,92,255,.45));
        }
      }
      .kiosk{
        width:min(92%, 560px);
        max-width:100%;
        text-align:center;
        display:flex;
        flex-direction:column;
        align-items:center;
        gap:20px;
      }
      /* Durum ikonu — sadece kontrol/başarı/hata anında gösterilir */
      .kiosk__icon{
        width:130px;
        height:130px;
        border-radius:50%;
        display:flex;
        align-items:center;
        justify-content:center;
        font-size:64px;
        line-height:1;
        background:var(--panel);
        border:2px solid var(--border);
        transition: background .25s, border-color .25s;
      }
      .kiosk__icon[hidden]{ display:none; }
      .kiosk__icon.is-ok{
        background: rgba(43,213,118,.16);
        border-color: var(--ok);
        color: var(--ok);
      }
      .kiosk__icon.is-fail{
        background: rgba(255,77,109,.16);
        border-color: var(--danger);
        color: var(--danger);
      }
      .kiosk__title{
        font-size:44px;
        font-weight:800;
        line-height:1.15;
        margin:0;
        letter-spacing:0.04em;
      }
      .kiosk__name{
        font-size:40px;
        font-weight:800;
        margin:0;
        letter-spacing:0.04em;
        color:var(--ok);
      }
      .kiosk__name[hidden]{ display:none; }
      .kiosk__subtitle{
        font-size:18px;
        color:var(--muted);
        margin:0;
        white-space:pre-line;
        text-align:center;
        line-height:1.6;
      }
      .kiosk__subtitle[hidden]{ display:none; }
      .kiosk__clock{
        position:absolute;
        bottom:24px;
        right:28px;
        font-size:14px;
        color:var(--muted);
        font-variant-numeric: tabular-nums;
      }
      .kiosk__input{
        position:absolute;
        opacity:0;
        pointer-events:none;
        width:1px;
        height:1px;
      }
      /* Telefon girişi butonu */
      .kiosk__phone-btn{
        margin-top:4px;
        padding:14px 44px;
        background:rgba(124,92,255,.10);
        border:1.5px solid rgba(124,92,255,.38);
        border-radius:12px;
        color:var(--text);
        font-size:17px;
        font-weight:700;
        letter-spacing:0.07em;
        cursor:pointer;
        font-family:var(--font);
        transition: background .2s, border-color .2s;
        -webkit-user-select:none;
        user-select:none;
      }
      .kiosk__phone-btn:hover, .kiosk__phone-btn:active{
        background:rgba(124,92,255,.26);
        border-color:var(--accent);
      }
      /* Telefon overlay — kiosk-right paneli içinde, logo kalmaya devam eder */
      .kiosk__phone-overlay{
        position:absolute;
        inset:0;
        background:var(--bg);
        display:flex;
        flex-direction:column;
        align-items:center;
        justify-content:center;
        gap:0px;
        z-index:10;
      }
      .kiosk__phone-overlay[hidden]{ display:none; }
      .kiosk__phone-title{
        font-size:20px;
        font-weight:700;
        color:var(--muted);
        margin:0;
        letter-spacing:1.03em;
      }
      .kiosk__phone-display{
        font-size:20px;
        font-weight:800;
        letter-spacing:1px;
        text-align:center;
        background:var(--panel);
        border:1px solid var(--border);
        border-radius:14px;
        padding:12px 18px;
        min-height:52px;
        display:flex;
        align-items:center;
        justify-content:center;
        font-variant-numeric:tabular-nums;
        white-space:nowrap;
      }
      .kiosk__phone-pad{
        display:grid;
        grid-template-columns:repeat(3, 86px);
        grid-template-rows:repeat(4, 72px);
        gap:10px;
      }
      .kiosk__phone-pad button{
        background:var(--panel);
        border:1px solid var(--border);
        border-radius:12px;
        color:var(--text);
        font-size:26px;
        font-weight:700;
        font-family:var(--font);
        cursor:pointer;
        transition: background .15s, border-color .15s;
        -webkit-user-select:none;
        user-select:none;
      }
      .kiosk__phone-pad button:active{
        background:rgba(124,92,255,.25);
        border-color:var(--accent);
      }
      .kiosk__phone-pad button:disabled{
        opacity:.3;
        pointer-events:none;
      }
      .kiosk__phone-pad .btn-confirm{
        background:rgba(43,213,118,.15);
        border-color:var(--ok);
        color:var(--ok);
      }
      .kiosk__phone-pad .btn-confirm:active{
        background:rgba(43,213,118,.35);
      }
      /* 15 saniyelik geri sayım çubuğu */
      .kiosk__phone-timer{
        width:270px;
        height:3px;
        background:var(--border);
        border-radius:2px;
        overflow:hidden;
      }
      .kiosk__phone-timer-bar{
        height:100%;
        width:100%;
        background:var(--accent);
        transform-origin:left;
        transition:none;
      }
      .kiosk__phone-timer-bar.is-running{
        transition: transform 15s linear;
        transform: scaleX(0);
      }
      .kiosk__phone-cancel{
        background:transparent;
        border:1px solid var(--border);
        border-radius:10px;
        color:var(--muted);
        font-size:15px;
        font-family:var(--font);
        padding:9px 28px;
        cursor:pointer;
        letter-spacing:0.04em;
        -webkit-user-select:none;
        user-select:none;
      }
      .kiosk__phone-cancel:active{ border-color:var(--danger); color:var(--danger); }
      /* Geçici yenile butonu — sol panelin en altı */
      .kiosk__reload-btn{
        position:absolute;
        bottom:18px;
        left:50%;
        transform:translateX(-50%);
        background:transparent;
        border:1px solid rgba(255,255,255,.15);
        border-radius:8px;
        color:rgba(255,255,255,.3);
        font-size:12px;
        font-family:var(--font);
        padding:5px 12px;
        cursor:pointer;
        white-space:nowrap;
        -webkit-user-select:none;
        user-select:none;
        transition: color .2s, border-color .2s;
      }
      .kiosk__reload-btn:hover, .kiosk__reload-btn:active{
        color:rgba(255,255,255,.8);
        border-color:rgba(255,255,255,.4);
      }
    </style>
  </head>
  <body>
    <div class="kiosk-left">
      <div class="kiosk__logo"></div>
      <button class="kiosk__reload-btn" onclick="location.reload(true)" title="Yenile (Ctrl+F5)">⟳ Yenile</button>
    </div>
    <div class="kiosk-right">
      <main class="kiosk">
        <div class="kiosk__icon" id="kioskIcon" hidden></div>
        <h1 class="kiosk__title" id="kioskTitle">HOŞGELDİNİZ</h1>
        <p class="kiosk__name" id="kioskName" hidden></p>
        <p class="kiosk__subtitle" id="kioskSubtitle" hidden></p>
        <button class="kiosk__phone-btn" id="kioskPhoneBtn">TELEFON İLE GİRİŞ</button>
      </main>
      <div class="kiosk__clock" id="kioskClock"></div>

      <div class="kiosk__phone-overlay" id="phoneOverlay" hidden>
    <!--    <p class="kiosk__phone-title">Telefon Numaranızı Girin</p>   -->
        <div class="kiosk__phone-display" id="phoneDisplay">0(_ _ _) _ _ _ - _ _ - _ _</div>
        <div class="kiosk__phone-pad" id="phonePad">
          <button data-digit="1">1</button>
          <button data-digit="2">2</button>
          <button data-digit="3">3</button>
          <button data-digit="4">4</button>
          <button data-digit="5">5</button>
          <button data-digit="6">6</button>
          <button data-digit="7">7</button>
          <button data-digit="8">8</button>
          <button data-digit="9">9</button>
          <button id="phoneBackspace">⌫</button>
          <button data-digit="0">0</button>
          <button class="btn-confirm" id="phoneConfirm" disabled>✓</button>
        </div>
        <div class="kiosk__phone-timer">
          <div class="kiosk__phone-timer-bar" id="phoneTimerBar"></div>
        </div>
        <button class="kiosk__phone-cancel" id="phoneCancelBtn">Vazgeç</button> 
      </div>
    </div>
    <input class="kiosk__input" id="kioskInput" type="text" autocomplete="off" autocapitalize="off" spellcheck="false" />
    <script src="./api.js"></script>
    <script src="./kiosk.js"></script>
  </body>
</html>
