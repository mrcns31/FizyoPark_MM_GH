# fizyopark-mm web (deploy) — statik dosyalar + /api proxy + same-origin API inject.
# Bu dosya yalnız Docker imajında kullanılır; repo kökündeki nginx.conf'a dokunulmaz.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # API'yi aynı-origin yap: api.js varsayilan olarak :3000/api'ye gider; bunu /api'ye cekiyoruz.
    sub_filter_once on;
    sub_filter_types text/html;
    sub_filter '</head>' '<script>window.__API_BASE__="/api";</script></head>';

    # /api -> backend (api servisi, container ic portu 3000). /api prefix korunur (backend /api/* bekler).
    location /api/ {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Gizli klasorler / dosyalar
    location /backend/      { deny all; return 403; }
    location /docker/       { deny all; return 403; }
    location /scripts/      { deny all; return 403; }
    location /raspberry-pi/ { deny all; return 403; }
    location /mobile/       { deny all; return 403; }
    location /mobile-rn/    { deny all; return 403; }
    location /docs/         { deny all; return 403; }
    location /node_modules/ { deny all; return 403; }
    location ~ /\.          { deny all; return 403; }
    location ~ \.env        { deny all; return 403; }

    # Statik dosyalar (SPA fallback)
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
