name: Deploy (fizyopark-mm → VPS)

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
  workflow_dispatch:

concurrency:
  group: deploy-fizyopark-mm
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  OWNER: mrcns31

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: api
            context: ./backend
            dockerfile: ./backend/Dockerfile-vps
          - name: web
            context: .
            dockerfile: ./Dockerfile.web
          - name: db
            context: .
            dockerfile: ./Dockerfile.db
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/fizyopark-${{ matrix.name }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/fizyopark-${{ matrix.name }}:latest
          cache-from: type=gha,scope=fizyopark-${{ matrix.name }}
          cache-to: type=gha,scope=fizyopark-${{ matrix.name }},mode=max

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy compose.yml + deploy.sh to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "deploy/compose.yml,deploy/deploy.sh"
          target: /opt/fizyopark-mm/
          strip_components: 1
          overwrite: true

      - name: Run deploy.sh on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: SHA,GHCR_TOKEN,GHCR_USER
          script: bash /opt/fizyopark-mm/deploy.sh "${SHA}"
        env:
          SHA: ${{ github.sha }}
          GHCR_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
          GHCR_USER: mrcns31

  retention:
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      matrix:
        pkg: [fizyopark-api, fizyopark-web, fizyopark-db]
    steps:
      - name: Keep last 2 versions of ${{ matrix.pkg }}
        continue-on-error: true
        uses: actions/delete-package-versions@v5
        with:
          package-name: ${{ matrix.pkg }}
          package-type: container
          min-versions-to-keep: 2
          token: ${{ secrets.GHCR_CLEANUP_TOKEN || secrets.GITHUB_TOKEN }}
