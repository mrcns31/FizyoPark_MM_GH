<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b1020" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>Bildirim Geçmişi – Seans Planlayıcı</title>
    <link rel="manifest" href="./manifest.json" />
    <link rel="icon" href="./icons/icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="logs-page">
      <header class="logs-page__header">
        <h1 class="logs-page__title">Bildirim Geçmişi</h1>
        <button type="button" class="btn btn--ghost" id="broadcastsCloseBtn">Kapat</button>
      </header>
      <p class="hint logs-page__intro">Üyelere gönderilen toplu push bildirimlerinin geçmişi.</p>
      <div id="broadcastsError" class="error hidden"></div>
      <div id="broadcastsCards" class="activity-logs-cards hidden"></div>
      <div class="logs-page__tableWrap activity-logs-table-wrap" id="broadcastsTableWrap">
        <table class="packagesTable activity-logs-table">
          <thead>
            <tr>
              <th>Tarih / Saat</th>
              <th>Gönderen</th>
              <th>Başlık</th>
              <th>Mesaj</th>
              <th>Seçilen</th>
              <th>İletildi</th>
              <th>Ulaşılamadı</th>
            </tr>
          </thead>
          <tbody id="broadcastsTableBody"></tbody>
        </table>
      </div>
      <div id="broadcastsPagination" class="logs-page__pagination"></div>
    </div>
    <script src="./api.js"></script>
    <script src="./broadcasts.js"></script>
    <script src="./pwa-register.js"></script>
  </body>
</html>
